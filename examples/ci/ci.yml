# A solo-builder CI pipeline: the whole "check column" in one file.
# Drop this at .github/workflows/ci.yml. Runs on every push and PR.
#
# Ordering is by value/speed: the cheapest checks that catch the most run first,
# so you get fast feedback and fail early. The headless Playwright golden-path
# run (Stage 4's test, automated) is the highest-value gate here.
#
# Adapt package manager / commands to your stack. The SHAPE is the lesson:
#   typecheck -> lint -> unit -> E2E golden path -> build -> secrets

name: CI

on:
  push:
    branches: [main, master, staging]
  pull_request:

# Cancel superseded runs on the same branch — don't waste minutes on stale pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      # 1. Cheapest, catches the most — type errors, missing exports.
      - name: Typecheck
        run: npx tsc --noEmit

      # 2. Convention enforcement — the reviewer you don't have.
      - name: Lint
        run: npm run lint

      # 3. The regression net for pure logic.
      - name: Unit tests
        run: npm test

      # 4. The money check: drive the real app headless, assert on rendered output.
      #    This is Stage 4's golden-path test, running on every push forever.
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E golden paths
        run: npx playwright test --reporter=line

      # Keep the trace when E2E fails so you can debug without reproducing locally.
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      # 5. "Compiles" != "builds clean." Catch it before deploy.
      - name: Build
        run: npm run build

  # Secrets scanning runs in parallel — you have no security team; this is it.
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for leaked secrets
        uses: gitleaks/gitleaks-action@v2
